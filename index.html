<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="index.css">
    <title>AES konverteris</title>
</head>
<body>
    <form class="inputForm">
        <div class="textInputWrapper"> 
            <div class="textInputTypeSelectionWrapper">
                <div id="selectTextInputRadio">
                    <input type="radio" id="inputAsText" name="inputTypeSelection" value="text" checked/>
                    <label for="inputAsText">Tekstas</label>
                </div>
                <div id="selectFileInputRadio">
                    <input type="radio" id="inputAsFile" name="inputTypeSelection" value="file"/>
                    <label for="inputAsFile">Failas (.txt)</label>
                </div>
            </div>
            <div id="textInput" class="inputContent"><textarea id="inputTextArea" class="inputTextArea" placeholder="Tekstas"></textarea></div>
            <div id="fileInput" class="hidden">
                <input type="file" id="textInputFile" accept=".txt" /></div>
        </div>
        <div class="radioWrapper"> 
            <div id="selectEcbMode">
                <input type="radio" id="ecb" name="cipherTypeSelection" value="ecb" checked />
                <label for="ecb">ECB</label>
            </div>
            <div id="selectCbcMode">
                <input type="radio" id="cbc" name="cipherTypeSelection" value="cbc"/>
                <label for="cbc">CBC</label>
            </div>
            <div id="selectCfbMode">
                <input type="radio" id="cfb" name="cipherTypeSelection" value="cfb"/>
                <label for="cfb">CFB</label>
            </div>
        </div>
        <div class="radioWrapper"> 
            <div id="select128">
                <input type="radio" id="key128" name="keyComplexitySelection" value="key128" checked/>
                <label for="key128">128 bitai</label>
            </div>
            <div id="select192">
                <input type="radio" id="key192" name="keyComplexitySelection" value="key192"/>
                <label for="key192">192 bitai</label>
            </div>
            <div id="select256">
                <input type="radio" id="key256" name="keyComplexitySelection" value="key256"/>
                <label for="key256">256 bitai</label>
            </div>
        </div>
        <div class="radioWrapper"> 
                <input type="text" id="keyInput" class="keyInput" placeholder="Raktas" required />
                <button id="getRandomKeyButton" class="getRandomKeyButton"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path d="M504.971 359.029c9.373 9.373 9.373 24.569 0 33.941l-80 79.984c-15.01 15.01-40.971 4.49-40.971-16.971V416h-58.785a12.004 12.004 0 0 1-8.773-3.812l-70.556-75.596 53.333-57.143L352 336h32v-39.981c0-21.438 25.943-31.998 40.971-16.971l80 79.981zM12 176h84l52.781 56.551 53.333-57.143-70.556-75.596A11.999 11.999 0 0 0 122.785 96H12c-6.627 0-12 5.373-12 12v56c0 6.627 5.373 12 12 12zm372 0v39.984c0 21.46 25.961 31.98 40.971 16.971l80-79.984c9.373-9.373 9.373-24.569 0-33.941l-80-79.981C409.943 24.021 384 34.582 384 56.019V96h-58.785a12.004 12.004 0 0 0-8.773 3.812L96 336H12c-6.627 0-12 5.373-12 12v56c0 6.627 5.373 12 12 12h110.785c3.326 0 6.503-1.381 8.773-3.812L352 176h32z"/></svg></button>
        </div>
        <div class="radioWrapper"> 
            <div id="selectScramble">
                <input type="radio" id="selectScrambleMode" name="operationModeSelection" value="scramble" checked/>
                <label for="selectScrambleMode">Koduoti</label>
            </div>
            <div id="selectDecode">
                <input type="radio" id="selecetDecodeMode" name="operationModeSelection" value="decode"/>
                <label for="selecetDecodeMode">Šifruoti</label>
            </div>
        </div>
        <div class="controlWrapper"> 
            <button id="executeButton" class="executeButton">Kovertuoti</button>
        </div>
    </form>

    <script src="eventListeners.js"></script>
</body>
</html>
